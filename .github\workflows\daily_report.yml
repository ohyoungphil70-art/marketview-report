name: MarketView Daily Report

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: |
          pip install -r requirements.txt

      - name: 📈 시황 리포트 생성 및 발송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:         ${{ secrets.REPORT_TO }}
        run: |
          python main.py
