name: MarketView Daily Report (Improved)

on:
  # schedule:
  #   - cron: '50 21 * * 0-4'   # 자동 발송 중지 (2026-05-28)
  workflow_dispatch:  # 수동 실행은 유지

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: |
          pip install -r requirements.txt

      - name: 📁 필요한 폴더 생성
        run: |
          mkdir -p data/archive
          mkdir -p data/analysis
          mkdir -p data/html
          mkdir -p reports
          mkdir -p logs

      - name: 📈 시황 리포트 생성 및 발송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python main.py

      - name: 🔄 인덱싱 재생성
        if: always()
        run: |
          python utils/index_generator.py || echo "인덱싱 실패 (무시함)"

      - name: 📚 월간 요약 생성
        if: always()
        run: |
          python -c "from utils.index_generator import generate_summary_for_month; from datetime import datetime; import pytz; KST = pytz.timezone('Asia/Seoul'); now = datetime.now(KST); generate_summary_for_month(now.year, now.month)" || echo "월간 요약 실패 (무시함)"

      - name: 🔧 Git 설정
        if: always()
        run: |
          git config user.name "MarketView Bot"
          git config user.email "bot@marketview.local"

      - name: 📤 변경사항 커밋 및 푸시
        if: always()
        run: |
          git add data/archive/ || true
          git add data/analysis/ || true
          git add data/html/ || true
          git add reports/ || true
          git add INDEX.md || true
          git add logs/ || true
          
          if ! git diff --cached --quiet; then
            REPORT_DATE=$(date +"%Y-%m-%d %H:%M KST")
            git commit -m "Daily Report: $REPORT_DATE" || true
            git push origin main || echo "Push 실패"
          else
            echo "변경사항 없음"
          fi

      - name: ✅ 작업 완료
        if: success()
        run: |
          echo "✅ MarketView 일일 리포트 완료!"

      - name: ❌ 오류 알림
        if: failure()
        run: |
          echo "❌ 오류 발생!"
